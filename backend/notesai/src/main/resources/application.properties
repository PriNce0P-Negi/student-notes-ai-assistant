# ════════════════════════════════════════════════════════════════
#  Database
# ════════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/notes_ai
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ════════════════════════════════════════════════════════════════
#  Server
# ════════════════════════════════════════════════════════════════
server.port=8080

# ════════════════════════════════════════════════════════════════
#  File Upload Limits
# ════════════════════════════════════════════════════════════════
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# ════════════════════════════════════════════════════════════════
#  AI — Gemini
# ════════════════════════════════════════════════════════════════
gemini.api.key=${GEMINI_API_KEY:your-api-key-here}

# ════════════════════════════════════════════════════════════════
#  JWT Security
# ════════════════════════════════════════════════════════════════
# A secure 256-bit base64 encoded secret key for HS256
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 24 hours in milliseconds
jwt.expiration=86400000

# ════════════════════════════════════════════════════════════════
#  Jackson / JSON
# ════════════════════════════════════════════════════════════════
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ════════════════════════════════════════════════════════════════
#  Logging
# ════════════════════════════════════════════════════════════════
logging.level.com.prince.notesai=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN